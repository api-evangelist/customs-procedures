aid: customs-procedures
name: Customs Procedures
kind: topic
description: >-
  Customs procedures are the regulated processes that govern how goods
  are entered into, transited through, and exported from a customs
  territory. The major procedures include release for free circulation
  (consumption entry), customs warehousing, inward and outward
  processing, temporary admission (e.g., ATA Carnet), transit (T1, TIR),
  and re-export. The Revised Kyoto Convention and the WCO SAFE Framework
  provide the international baseline; national authorities such as U.S.
  CBP, the European Commission's DG TAXUD, and HMRC publish their own
  procedures and codes. Most procedures are operationalized through
  national customs computer systems (ACE, ICS2, AES, CDS) and rely on
  EDI messaging rather than public REST APIs.
